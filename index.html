<!DOCTYPE html>
<html lang="zh-CN">

                        <div class="subtitle-row">

                        </div>
                        <div class="tagline-row">
                            <span class="tagline">3分钟解锁身体的真实朝代</span>
                        </div>
                    </div>

                    <div class="shop-links">

                    <div class="result-list-section">
                        <div class="result-list-title">养生人格</div>
                        <div class="result-list" id="result-list"></div>
                    </div>
                    <div class="bottom-decoration">
                        <div class="brand-slogan">方回春堂 · 名医好药</div>
                    </div>
                </div>
            </div>
        </div>

        <div id="page-question" class="page">
            <div class="question-header">
                <div class="progress-bar">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
                <div class="question-counter"><span id="current-q">1</span>/15</div>
            </div>
            <div class="question-content">
                <div class="question-text" id="question-text"></div>
                <div class="options-list" id="options-list"></div>
            </div>
            <div class="question-footer">
                <div class="nav-btn prev-btn" id="prev-btn" style="opacity:0">上一题</div>
                <div class="nav-btn next-btn" id="next-btn">下一题</div>
            </div>
        </div>

        <div id="page-loading" class="page">
            <div class="loading-wrapper">
                <div class="loading-ink"></div>
                <div class="loading-content">
                    <div class="loading-seal-container">
                        <div class="loading-seal">春</div>
                        <div class="loading-seal-ring"></div>
                    </div>
                    <div class="loading-title">正在解读</div>
                    <div class="loading-subtitle">你的身体密码</div>
                    <div class="loading-dots">
                        <span></span><span></span><span></span>

                <div class="product-section">
                    <div class="product-title">推荐产品</div>
                    <div class="product-card" id="product-card"></div>
                    <a href="#" class="product-link-btn" id="product-link-btn" target="_blank">立即购买</a>
                </div>
                <div class="result-shop-links">
                    <a href="#" class="result-shop-link tmall" id="result-tmall-link" target="_blank">天猫旗舰店</a>

                </div>
                <div class="disclaimer">* 本测试仅为趣味互动，不构成医疗建议。如有身体不适，请及时就医或咨询方回春堂执业医师。</div>
                <div class="action-btns">
                    <div class="action-btn primary" id="generate-poster">生成我的养生人格海报</div>
                    <div class="action-btn secondary" id="retest">重新测试</div>
                    <a href="https://fhct-wechat.fhctdyf.com/mini/?page=activeDetail&id=69c1e2cfd08e5b2a089b0d42&channel=1" class="action-btn tertiary" target="_blank">预约线下义诊</a>

                <div class="expert-note">以上建议仅供参考，个性化调理请咨询方回春堂名医。</div>
            </div>
        </div>

        <div id="page-poster" class="page">
            <div class="poster-container" id="poster-container">
                <div class="poster-content" id="poster-content"></div>
            </div>
            <div class="poster-actions">
                <button type="button" class="action-btn primary" id="save-poster">保存到相册</button>
                <button type="button" class="action-btn tertiary" id="back-result">返回结果</button>
            </div>
        </div>
        
        <!-- 水墨晕染转场 -->
        <div id="ink-transition" class="ink-transition">
            <div class="ink-layer ink-layer-1"></div>
            <div class="ink-layer ink-layer-2"></div>
